name: field-service CI

on:
  push:
    branches: [main, develop, migration/from-vdp]
    paths:
      - 'field-service/**'
      - '.github/workflows/field-service-ci.yml'
  pull_request:
    branches: [main, migration/from-vdp]
    paths:
      - 'field-service/**'
      - '.github/workflows/field-service-ci.yml'

defaults:
  run:
    working-directory: field-service

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Build check runs on every push when CI_BUILD_ENABLED repo variable is set to 'true'.
    # Set it via: GitHub repo → Settings → Variables → Actions → New repository variable.
    if: github.event_name == 'push' && vars.CI_BUILD_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: field-service

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: field-service
        env:
          # prisma generate reads the schema only — no live DB connection needed
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build
        run: pnpm build
        working-directory: field-service
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
