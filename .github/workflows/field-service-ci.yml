name: field-service CI

on:
  push:
    branches: [main, develop, migration/from-vdp]
    paths:
      - 'field-service/**'
      - '.github/workflows/field-service-ci.yml'
  pull_request:
    branches: [main, migration/from-vdp]
    paths:
      - 'field-service/**'
      - '.github/workflows/field-service-ci.yml'

defaults:
  run:
    working-directory: field-service

# Match production: the app pins TZ to Africa/Johannesburg in
# `next.config.ts` and `instrumentation.ts`, but Vitest runs Node directly
# without going through Next, so we have to export it here. Without this,
# any test that touches local-clock dates fails on UTC runners.
env:
  TZ: Africa/Johannesburg

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod

      # Several tests transitively import @/lib/db (Prisma client). Without
      # `prisma generate` the .prisma/client/default file is missing on a
      # fresh install and every Prisma-touching test errors out. The build
      # job already runs this step; lint-and-test must too.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    name: Build and Start Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: field-service

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: field-service
        env:
          # prisma generate reads the schema only — no live DB connection needed
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build
        run: pnpm build:ci
        working-directory: field-service
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Start built app and probe health
        run: |
          PORT=3105 pnpm start:ci > /tmp/field-service-start.log 2>&1 &
          echo "$!" > /tmp/field-service-start.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3105/api/health >/tmp/field-service-health.json; then
              break
            fi
            sleep 1
          done
          LOCAL_SMOKE_BASE_URL=http://127.0.0.1:3105 pnpm smoke:local
        working-directory: field-service
        env:
          PORT: 3105
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          PEACH_ACCESS_TOKEN: ${{ secrets.PEACH_ACCESS_TOKEN }}
          PEACH_ENTITY_ID: ${{ secrets.PEACH_ENTITY_ID }}

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: field-service

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: field-service

      - name: Run smoke tests
        run: |
          test -n "$E2E_BASE_URL"
          test -n "$E2E_ADMIN_EMAIL"
          test -n "$E2E_ADMIN_PASSWORD"
          npx playwright test
        working-directory: field-service
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: field-service/playwright-report/
          retention-days: 7
