name: field-service CI

on:
  push:
    branches: [main, develop, migration/from-vdp]
    paths:
      - '.claude/settings.json'
      - '.githooks/**'
      - 'field-service/**'
      - 'scripts/git-hooks/**'
      - '.github/workflows/field-service-ci.yml'
  pull_request:
    branches: [main, migration/from-vdp]
    paths:
      - '.claude/settings.json'
      - '.githooks/**'
      - 'field-service/**'
      - 'scripts/git-hooks/**'
      - '.github/workflows/field-service-ci.yml'

defaults:
  run:
    working-directory: field-service

# Match production: the app pins TZ to Africa/Johannesburg in
# `next.config.ts` and `instrumentation.ts`, but Vitest runs Node directly
# without going through Next, so we have to export it here. Without this,
# any test that touches local-clock dates fails on UTC runners.
env:
  TZ: Africa/Johannesburg

permissions:
  contents: read
  checks: write

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate local git hooks
        run: |
          bash -n ../scripts/git-hooks/field-service-pre-push.sh
          sh -n ../.githooks/pre-push

      - name: Secret hygiene guard
        run: pnpm security:secrets

      - name: Audit production dependencies
        run: pnpm audit --prod

      # Several tests transitively import @/lib/db (Prisma client). Without
      # `prisma generate` the .prisma/client/default file is missing on a
      # fresh install and every Prisma-touching test errors out. The build
      # job already runs this step; lint-and-test must too.
      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check Smile ID result-code drift
        # Exit 0 = no drift (pass); exit 1 = unclassified code found (block merge —
        # update result-codes.ts or acknowledge in smile-id-codes-acknowledged.json);
        # exit 2 = could not fetch docs page (soft pass, don't block on Smile's docs
        # site being down).
        run: |
          set +e
          pnpm check:smile-id-codes
          EXIT=$?
          set -e
          if [ "$EXIT" -eq 2 ]; then
            echo "::warning::Could not fetch Smile docs page (exit 2); drift check skipped this run"
            exit 0
          fi
          exit $EXIT

      - name: Verify live public-table RLS
        if: github.event_name == 'push'
        run: pnpm security:rls
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: field-service

      - name: Generate Prisma client
        run: pnpm exec prisma generate
        working-directory: field-service
        env:
          # prisma generate reads the schema only — no live DB connection needed
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build
        run: pnpm build:ci
        working-directory: field-service
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_REF: ${{ github.ref_name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

  live-start-smoke:
    name: Live Start Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'push' && vars.FIELD_SERVICE_LIVE_SMOKE == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: field-service

      - name: Verify live smoke secrets
        run: |
          test -n "$DATABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          test -n "$WHATSAPP_ACCESS_TOKEN"
          test -n "$WHATSAPP_PHONE_NUMBER_ID"
          test -n "$PEACH_ACCESS_TOKEN"
          test -n "$PEACH_ENTITY_ID"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          PEACH_ACCESS_TOKEN: ${{ secrets.PEACH_ACCESS_TOKEN }}
          PEACH_ENTITY_ID: ${{ secrets.PEACH_ENTITY_ID }}

      - name: Build with live smoke metadata
        run: pnpm build:ci
        working-directory: field-service
        env:
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_REF: ${{ github.ref_name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Start built app and probe health
        run: |
          set -euo pipefail
          PORT=3105 pnpm start:ci > /tmp/field-service-start.log 2>&1 &
          app_pid=$!
          cleanup() {
            if kill -0 "$app_pid" >/dev/null 2>&1; then
              kill "$app_pid" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT
          healthy=false
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3105/api/health >/tmp/field-service-health.json; then
              healthy=true
              break
            fi
            sleep 1
          done
          if [ "$healthy" != "true" ]; then
            echo 'field-service failed to become healthy in 30 attempts'
            tail -n 60 /tmp/field-service-start.log || true
            exit 1
          fi
          LOCAL_SMOKE_BASE_URL=http://127.0.0.1:3105 LOCAL_SMOKE_EXPECT_COMMIT_SHA="$GITHUB_SHA" LOCAL_SMOKE_REQUIRE_COMPONENTS=db,auth.supabase_env_complete,whatsapp,payments pnpm smoke:local
        working-directory: field-service
        env:
          PORT: 3105
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GIT_COMMIT_SHA: ${{ github.sha }}
          GIT_COMMIT_REF: ${{ github.ref_name }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          PEACH_ACCESS_TOKEN: ${{ secrets.PEACH_ACCESS_TOKEN }}
          PEACH_ENTITY_ID: ${{ secrets.PEACH_ENTITY_ID }}

  smoke:
    name: Preview E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && vars.FIELD_SERVICE_E2E_SMOKE == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: field-service

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
        working-directory: field-service

      - name: Assert smoke target matches this commit
        run: |
          test -n "$E2E_BASE_URL"
          LOCAL_SMOKE_BASE_URL="$E2E_BASE_URL" \
          LOCAL_SMOKE_EXPECT_COMMIT_SHA="$GITHUB_SHA" \
          LOCAL_SMOKE_REQUIRE_COMPONENTS='db,auth.supabase_env_complete,whatsapp,payments' \
          pnpm smoke:local
        env:
          # SECURITY (finding 85d4a2cb): prefer the PROTECTED secret over the repo
          # variable so a less-trusted actor who can edit variables cannot redirect
          # admin smoke credentials to an attacker-controlled host. playwright.config.ts
          # additionally enforces a hostname allowlist on the resolved base URL.
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || vars.FIELD_SERVICE_E2E_BASE_URL }}

      - name: Run smoke tests
        run: |
          test -n "$E2E_BASE_URL"
          test -n "$E2E_ADMIN_EMAIL"
          test -n "$E2E_ADMIN_PASSWORD"
          pnpm exec playwright test e2e/smoke.spec.ts
        working-directory: field-service
        env:
          # SECURITY (finding 85d4a2cb): protected secret takes precedence over the
          # repo variable so admin smoke credentials cannot be redirected to an
          # attacker-controlled host via a variable override.
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL || vars.FIELD_SERVICE_E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: field-service/playwright-report/
          retention-days: 7
