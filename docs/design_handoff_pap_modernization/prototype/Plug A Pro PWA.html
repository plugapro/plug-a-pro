<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Plug A Pro · Modernized PWA</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      background: #E9E9EE; color: #0A0A0F;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; }
    /* hide scrollbars on horizontal pill rows */
    ::-webkit-scrollbar { display: none; }
    /* render-hint */
    .pap-noselect { user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Starter components -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Design system -->
  <script type="text/babel" src="tokens.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="screens-auth.jsx"></script>
  <script type="text/babel" src="screens-customer.jsx"></script>
  <script type="text/babel" src="screens-book.jsx"></script>
  <script type="text/babel" src="screens-misc.jsx"></script>

  <!-- App router -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
