name: field-service CI

on:
  push:
    branches: [main, develop, migration/from-vdp]
  pull_request:
    branches: [main, migration/from-vdp]

permissions:
  contents: read
  checks: write

defaults:
  run:
    working-directory: field-service

jobs:
  check:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test --run

  migrate-diff:
    name: Schema/migration sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check schema matches migrations
        # Fails if schema.prisma was changed without a corresponding migration.
        # Pure local file comparison — no database connection required.
        run: |
          pnpm exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --exit-code

  migrate-status:
    name: Production migration status (push only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check all migrations applied in production
        # Fails if any local migration is not yet applied in the production DB.
        # Skipped automatically when DATABASE_URL secret is not configured.
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not set — skipping production migration status check."
            exit 0
          fi
          pnpm exec prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build:
    name: Build (push only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && vars.CI_BUILD_ENABLED == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:ci
        env:
          SKIP_ENV_VALIDATION: '1'

  smoke:
    name: Smoke tests (push only)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: field-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Assert smoke target matches this deployment
        run: |
          test -n "$E2E_BASE_URL"
          LOCAL_SMOKE_BASE_URL="$E2E_BASE_URL" \
          LOCAL_SMOKE_EXPECT_COMMIT_SHA="$GITHUB_SHA" \
          LOCAL_SMOKE_REQUIRE_COMPONENTS='db,auth.supabase_env_complete,whatsapp,payments' \
          pnpm smoke:local

      - name: Run smoke suite
        run: pnpm exec playwright test e2e/smoke.spec.ts
        env:
          E2E_BASE_URL: ${{ vars.FIELD_SERVICE_E2E_BASE_URL || secrets.E2E_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
